<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Echo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
 <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container head  rounded-4">
        <div class="row">
            <div class="col">Welcome to Echo</div>
            <div class="col">
                <div class="container login">
                    <form action="">
                        <fieldset>    
                            <input  type="email" placeholder="Enter your email" class="rounded-4 Username">
                            <br>
                            <br>
                            <input type="password" placeholder="Enter your password" class="rounded-4 Password">
                            <br>
                            <br>
                            <Button class="rounded-pill">Login</Button>
                        </fieldset>
                    </form>
                    <br>
                   <a href="">Forget password?</a>
                    <hr>
                    <a href="signupscreen/signup.html"><button class="rounded-pill create">Create Account</button></a>
                </div>
            </div>
            
          </div>
      </div>
    <script src="script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

</html>
